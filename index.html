<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Sitio Web</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <h1 id="titulo-principal">Mi Sitio Web</h1>
        
        <nav class="nav">
            <ul class="nav__menu">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Servicios</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="main">
        
        <section class="contenido">
            
            <article class="articulo">
                <h2>Artículo Principal</h2>
                <img src="imagen1.png" alt="Imagen de ejemplo" width="300">
                <p>
                    Este es un ejemplo de artículo usando estructura semántica HTML5.
                </p>

                <button class="articulo__boton">Leer más</button>
            </article>

        </section>

        <aside class="sidebar">
            <h3>Barra Lateral</h3>
            <p>Información adicional o publicidad.</p>
        </aside>

    </main>

    <footer class="footer">
        <p>© 2026 - Todos los derechos reservados</p>
    </footer>

</body>
</html>
